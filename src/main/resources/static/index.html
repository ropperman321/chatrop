<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Chatrop — Mensajes</title>
    <meta name="description" content="Chatrop: chat en tiempo real para grupos y mensajes directos.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; overscroll-behavior: none; background: #0b0f17; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseBadge { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }

        .anim-fade-up { animation: fadeUp 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .anim-fade-in { animation: fadeIn 0.22s ease-out both; }
        .badge-pulse  { animation: pulseBadge 0.4s ease-out; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }

        /* ── Bubble tails ── */
        .bubble-me   { border-bottom-right-radius: 4px !important; }
        .bubble-them { border-bottom-left-radius: 4px !important; }

        /* ── Conv row ── */
        .conv-row { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .conv-row:hover { transform: translateY(-1px); background-color: rgba(96, 165, 250, 0.08); }
        .conv-row:active { transform: scale(0.97); }

        /* ── Input focus ring ── */
        .ring-focus:focus { outline: none; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.35); border-color: rgba(96, 165, 250, 0.5); }

        /* ── Sidebar / Chat panel slide ── */
        #panel-list, #panel-chat {
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
            will-change: transform, opacity;
        }

        /* ── Gradient text ── */
        .grad-text {
            background: linear-gradient(135deg,#60a5fa,#93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Safe area ── */
        .pb-safe { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: max(12px, env(safe-area-inset-top)); }

        @media (min-width: 768px) {
            #panel-list, #panel-chat {
                transform: none !important;
                opacity: 1 !important;
                pointer-events: auto !important;
            }
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 antialiased">

<!-- ═══════════════════════════════════════
     LOGIN
════════════════════════════════════════ -->
<div id="login-screen"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 px-6">
    <div class="w-full max-w-sm anim-fade-up">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-400 to-sky-500 flex items-center justify-center shadow-xl shadow-blue-500/20 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-black grad-text">Chatrop</h1>
            <p class="text-slate-500 text-xs mt-1">Mensajes en tiempo real</p>
        </div>

        <div class="space-y-3">
            <input id="login-email" type="email" autocomplete="email"
                   placeholder="Correo electrónico" value="tester@chatrop.com"
                   class="w-full px-4 py-3.5 rounded-2xl bg-slate-900 border border-slate-800 text-white text-sm placeholder-slate-600 ring-focus transition-all">
            <input id="login-password" type="password" autocomplete="current-password"
                   placeholder="Contraseña" value="password"
                   onkeypress="if(event.key==='Enter') { authMode === 'login' ? login() : register(); }"
                   class="w-full px-4 py-3.5 rounded-2xl bg-slate-900 border border-slate-800 text-white text-sm placeholder-slate-600 ring-focus transition-all">
            <button id="login-btn" onclick="login()"
                    class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-blue-500 to-sky-500 hover:from-blue-400 hover:to-sky-400 text-white text-sm font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                Entrar
            </button>
            <div class="text-center mt-4">
                <a id="toggle-auth-mode-link" onclick="toggleAuthMode()" class="text-slate-400 text-xs cursor-pointer select-none">
                    ¿No tienes una cuenta? <span class="text-blue-400 font-semibold hover:underline">Regístrate</span>
                </a>
            </div>
        </div>
        <p id="login-error" class="hidden text-rose-400 text-xs text-center mt-3"></p>
    </div>
</div>

<!-- ═══════════════════════════════════════
     CHAT APP  — two-panel layout
     On mobile: panels stack and slide.
     On desktop: panels sit side by side.
════════════════════════════════════════ -->
<div id="chat-app" class="hidden fixed inset-0 flex">

    <!-- ╔══════════════════════════════
         PANEL LEFT — Conversation list
    ══════════════════════════════════╝ -->
    <div id="panel-list"
         class="absolute inset-0 z-10 flex flex-col bg-slate-950
                md:relative md:w-[340px] md:flex-shrink-0 md:border-r md:border-slate-800/60">

        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-safe pt-5 pb-3">
            <div class="min-w-0">
                <h1 class="text-lg font-black grad-text leading-none">Chatrop</h1>
                <p id="user-display" class="text-[11px] text-slate-500 mt-0.5 truncate max-w-[200px]">—</p>
            </div>
            <div class="flex">
                <button onclick="(function(){ const n=prompt('Nombre del nuevo grupo:'); if(n) createGroup(n); })()" title="Crear grupo"
                        class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-900 hover:bg-slate-800 text-slate-500 hover:text-blue-400 transition-all flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
                <button onclick="logout()" title="Cerrar sesión"
                        class="ml-2 w-9 h-9 flex items-center justify-center rounded-xl bg-slate-900 hover:bg-rose-900/30 text-slate-500 hover:text-rose-400 transition-all flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Conversation list -->
        <div id="conversations-list"
             class="flex-1 overflow-y-auto px-2 py-1 space-y-0.5">
            <p class="text-center text-slate-600 text-xs mt-10 anim-fade-in">Cargando…</p>
        </div>

        <!-- Search / action bar -->
        <div class="px-3 pt-2 pb-safe border-t border-slate-900">
            <div class="relative">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600 pointer-events-none"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input id="search-input" type="text"
                       placeholder="Buscar o nueva conversación…"
                       oninput="onSearch(this.value)"
                       class="w-full pl-10 pr-4 py-3 rounded-2xl bg-slate-900 border border-slate-800 text-white text-sm placeholder-slate-600 ring-focus transition-all">
            </div>
            <div id="search-actions" class="mt-1.5 space-y-1 hidden"></div>
        </div>
    </div>

    <!-- ╔══════════════════════════════
         PANEL RIGHT — Chat window
    ══════════════════════════════════╝ -->
    <div id="panel-chat"
         class="absolute inset-0 z-20 flex flex-col bg-[#0e1117] translate-x-full
                md:relative md:flex md:flex-1 md:translate-x-0">

        <!-- Chat header -->
        <div class="flex items-center gap-3 px-4 py-3 pt-safe border-b border-slate-800/70
                    bg-slate-950/80 backdrop-blur-xl flex-shrink-0">
            <!-- Back (mobile only) -->
            <button onclick="goBackToList()" id="back-btn"
                    class="md:hidden w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-xl
                           text-slate-400 hover:bg-slate-800 transition-all">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>

            <!-- Avatar -->
            <div id="chat-avatar"
                 class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-sm font-bold
                        bg-slate-800 text-slate-500">
                ?
            </div>

            <!-- Title -->
            <div class="flex-1 min-w-0">
                <h2 id="chat-title" class="text-sm font-bold text-white truncate">Selecciona un chat</h2>
                <p  id="chat-subtitle" class="text-[11px] text-slate-500 truncate">Elige una conversación para empezar</p>
            </div>

            <!-- Add member -->
            <button id="add-member-btn" onclick="openAddMemberModal()" title="Añadir miembro"
                    class="hidden w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-xl
                           bg-emerald-600/15 hover:bg-emerald-600/30 text-emerald-400 transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </button>
            <!-- Leave group -->
            <button id="leave-group-btn" onclick="leaveCurrentGroup()" title="Salir del grupo"
                    class="hidden w-9 h-9 flex-shrink-0 flex items-center justify-center rounded-xl
                           bg-rose-600/15 hover:bg-rose-600/30 text-rose-400 transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="messages-container"
             class="flex-1 overflow-y-auto px-4 py-5 flex flex-col space-y-2">
            <div class="m-auto flex flex-col items-center text-center anim-fade-in">
                <div class="w-14 h-14 rounded-2xl bg-slate-800/60 flex items-center justify-center mb-3">
                    <svg class="w-7 h-7 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <p class="text-slate-600 text-sm">Selecciona una conversación</p>
            </div>
        </div>

        <!-- Input bar -->
        <div class="flex-shrink-0 flex items-end gap-3 px-4 py-3 pb-safe
                    border-t border-slate-800/70 bg-slate-950/80 backdrop-blur-xl">
            <input id="message-input" type="text" disabled
                   placeholder="Elige una sala para escribir…"
                   onkeypress="if(event.key==='Enter') sendMessage()"
                   class="flex-1 px-4 py-3 rounded-2xl bg-slate-900 border border-slate-800
                          text-white text-sm placeholder-slate-600
                          disabled:opacity-40 ring-focus transition-all">
            <button id="send-btn" disabled onclick="sendMessage()"
                    class="w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-2xl
                           bg-blue-500 hover:bg-blue-400 disabled:opacity-40 disabled:cursor-not-allowed
                           text-white shadow-lg shadow-blue-500/20 transition-all active:scale-90">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════ -->
<script>
// ── Constants ──────────────────────────────────────────
const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL     = `${wsProtocol}//${location.host}/ws`;

// ── State ──────────────────────────────────────────────
let token            = localStorage.getItem('token');
let currentUserEmail = localStorage.getItem('userEmail');
let currentUserId    = localStorage.getItem('userId');
let stompClient      = null;
let activeChatType   = null;   // 'GROUP' | 'DIRECT'
let activeTargetId   = null;   // groupId or email
let unreadCounts     = { groups: {}, directs: {} };
let groupSubs        = {};
let allGroups        = [];
let allDirectChats   = [];
let searchQuery      = '';

// Unified list item shape:
// { type, id, label, lastMsg, lastTime, unread, active, onClick }
let allItems = [];

// ── Boot ───────────────────────────────────────────────
window.onload = () => {
    if (token && currentUserEmail && currentUserId) showChatApp();
    
    // Dynamically adjust viewport height when keyboard is visible on mobile
    if (window.visualViewport) {
        const adjustLayoutForKeyboard = () => {
            const vv = window.visualViewport;
            const app = q('chat-app');
            if (app && !app.classList.contains('hidden')) {
                app.style.height = `${vv.height}px`;
                app.style.top = `${vv.offsetTop}px`;
            }
            const container = q('messages-container');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        };
        window.visualViewport.addEventListener('resize', adjustLayoutForKeyboard);
        window.visualViewport.addEventListener('scroll', adjustLayoutForKeyboard);
        
        // Ensure scroll to bottom on input focus
        const inp = q('message-input');
        if (inp) {
            inp.addEventListener('focus', () => {
                setTimeout(adjustLayoutForKeyboard, 150);
            });
        }
    }
};

// ── Auth Mode Toggle & Register ────────────────────────
let authMode = 'login';
function toggleAuthMode() {
    authMode = authMode === 'login' ? 'register' : 'login';
    const btn = q('login-btn');
    const toggleLink = q('toggle-auth-mode-link');
    const errEl = q('login-error');
    
    errEl.classList.add('hidden');
    if (authMode === 'login') {
        btn.textContent = 'Entrar';
        btn.setAttribute('onclick', 'login()');
        toggleLink.innerHTML = '¿No tienes una cuenta? <span class="text-indigo-400 font-semibold hover:underline">Regístrate</span>';
    } else {
        btn.textContent = 'Registrarse';
        btn.setAttribute('onclick', 'register()');
        toggleLink.innerHTML = '¿Ya tienes una cuenta? <span class="text-indigo-400 font-semibold hover:underline">Inicia sesión</span>';
    }
}

async function register() {
    const email    = q('login-email').value.trim();
    const password = q('login-password').value;
    const btn      = q('login-btn');
    const errEl    = q('login-error');
    errEl.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Registrando…';

    try {
        const res = await api('/api/users/register', 'POST', { email, password }, false);
        if (!res.ok) {
            const text = await res.text();
            throw new Error(text || 'Error al registrar el usuario');
        }
        authMode = 'register';
        toggleAuthMode();
        errEl.textContent = 'Usuario registrado con éxito. ¡Ya puedes iniciar sesión!';
        errEl.className = 'text-emerald-400 text-xs text-center mt-3';
        errEl.classList.remove('hidden');
    } catch (e) {
        errEl.textContent = e.message;
        errEl.className = 'text-rose-400 text-xs text-center mt-3';
        errEl.classList.remove('hidden');
    } finally {
        btn.disabled = false;
    }
}

// ── Login ──────────────────────────────────────────────
async function login() {
    const email    = q('login-email').value.trim();
    const password = q('login-password').value;
    const btn      = q('login-btn');
    const errEl    = q('login-error');
    errEl.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Entrando…';

    try {
        const res = await api('/api/users/login', 'POST', { email, password }, false);
        if (!res.ok) throw new Error('Credenciales inválidas');
        const data = await res.json();
        token = data.token;
        currentUserEmail = email;
        currentUserId = data.userId;
        localStorage.setItem('token', token);
        localStorage.setItem('userEmail', currentUserEmail);
        localStorage.setItem('userId', currentUserId);
        showChatApp();
    } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Entrar';
    }
}

function showChatApp() {
    q('login-screen').classList.add('hidden');
    const app = q('chat-app');
    app.classList.remove('hidden');
    q('user-display').textContent = currentUserEmail;
    connectWebSocket();
    refreshAll();
}

// ── WebSocket ──────────────────────────────────────────
function connectWebSocket() {
    stompClient = new StompJs.Client({
        brokerURL: WS_URL,
        connectHeaders: { Authorization: 'Bearer ' + token },
        reconnectDelay: 5000,
        heartbeatIncoming: 4000,
        heartbeatOutgoing: 4000
    });
    stompClient.onConnect = () => {
        // Private DMs
        stompClient.subscribe('/topic/messages/' + currentUserId, evt => {
            const msg  = JSON.parse(evt.body);
            const peer = msg.senderEmail === currentUserEmail ? msg.receiverEmail : msg.senderEmail;
            if (activeChatType === 'DIRECT' && activeTargetId === peer) {
                appendMessage(msg);
                if (msg.senderEmail !== currentUserEmail) markRead(null, peer);
            } else {
                refreshAll();
            }
        });
        subscribeGroups();
    };
    stompClient.activate();
}

async function subscribeGroups() {
    for (const k in groupSubs) groupSubs[k].unsubscribe();
    groupSubs = {};
    const groups = await getGroups();
    groups.forEach(g => {
        groupSubs[g.id] = stompClient.subscribe(`/topic/messages/group/${g.id}`, evt => {
            const msg = JSON.parse(evt.body);
            if (activeChatType === 'GROUP' && activeTargetId === msg.groupId) {
                appendMessage(msg);
                if (msg.senderEmail !== currentUserEmail) markRead(msg.groupId, null);
            } else {
                refreshAll();
            }
        });
    });
}

// ── Data fetching ──────────────────────────────────────
async function getGroups() {
    const r = await api('/api/groups'); return r.ok ? r.json() : [];
}
async function getDirectChats() {
    const r = await api('/api/messages/conversations'); return r.ok ? r.json() : [];
}
async function getUnread() {
    const r = await api('/api/messages/unread');
    return r.ok ? r.json() : { groups: {}, directs: {} };
}

// Fetch last message preview for a conversation
const previewCache = {};   // key -> { lastMsg, lastTime }
async function fetchLastMessage(type, id) {
    const cacheKey = `${type}:${id}`;
    try {
        let url = type === 'GROUP'
            ? `/api/messages/history/group/${id}`
            : `/api/messages/history/${id}`;
        const r = await api(url);
        if (!r.ok) return null;
        const msgs = await r.json();
        if (!msgs || msgs.length === 0) return null;
        const last = msgs[msgs.length - 1];
        const preview = {
            lastMsg:  last.senderEmail === currentUserEmail
                        ? `Tú: ${last.content}`
                        : last.content,
            lastTime: last.timestamp
        };
        previewCache[cacheKey] = preview;
        return preview;
    } catch { return previewCache[cacheKey] || null; }
}

// ── Main refresh ───────────────────────────────────────
async function refreshAll() {
    [allGroups, allDirectChats, unreadCounts] = await Promise.all([
        getGroups(), getDirectChats(), getUnread()
    ]);

    // Build preview data in parallel (limit concurrent requests)
    const previewJobs = [];
    allGroups.forEach(g => {
        const k = `GROUP:${g.id}`;
        if (!previewCache[k]) previewJobs.push(fetchLastMessage('GROUP', g.id));
    });
    allDirectChats.forEach(c => {
        const k = `DIRECT:${c.email}`;
        if (!previewCache[k]) previewJobs.push(fetchLastMessage('DIRECT', c.email));
    });
    if (previewJobs.length) await Promise.allSettled(previewJobs);

    buildItems();
    renderList();
}

function buildItems() {
    allItems = [];

    allGroups.forEach(g => {
        const p = previewCache[`GROUP:${g.id}`] || {};
        allItems.push({
            type:    'GROUP',
            id:      g.id,
            label:   g.name,
            lastMsg: p.lastMsg  || '',
            lastTime: p.lastTime || null,
            unread:  unreadCounts.groups?.[g.id] || 0,
            active:  activeChatType === 'GROUP' && activeTargetId === g.id,
            onClick: () => selectGroup(g.id, g.name)
        });
    });

    allDirectChats.forEach(c => {
        const p = previewCache[`DIRECT:${c.email}`] || {};
        allItems.push({
            type:    'DIRECT',
            id:      c.email,
            label:   c.email,
            lastMsg: p.lastMsg  || '',
            lastTime: p.lastTime || null,
            unread:  unreadCounts.directs?.[c.email] || 0,
            active:  activeChatType === 'DIRECT' && activeTargetId === c.email,
            onClick: () => selectDirect(c.email)
        });
    });

    // Sort: most recent first (items without lastTime go to bottom)
    allItems.sort((a, b) => {
        if (!a.lastTime && !b.lastTime) return a.label.localeCompare(b.label);
        if (!a.lastTime) return 1;
        if (!b.lastTime) return -1;
        return new Date(b.lastTime) - new Date(a.lastTime);
    });
}

// ── Render list ────────────────────────────────────────
function renderList() {
    const container = q('conversations-list');
    container.innerHTML = '';

    const q_ = searchQuery.trim().toLowerCase();
    const items = q_
        ? allItems.filter(i => i.label.toLowerCase().includes(q_))
        : allItems;

    if (items.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-600 text-xs mt-12 anim-fade-in">
            ${q_ ? `Sin resultados para "${esc(q_)}"` : 'No hay conversaciones aún'}
        </p>`;
        return;
    }

    items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = `conv-row flex items-center gap-3 px-3 py-3 rounded-2xl border
            anim-fade-up select-none
            ${item.active
                ? 'bg-blue-500/10 border-blue-400/20'
                : 'border-transparent hover:bg-slate-900'}`;
        el.style.animationDelay = Math.min(idx * 18, 150) + 'ms';

        const isGroup    = item.type === 'GROUP';
        const avatarCls  = isGroup
            ? 'bg-blue-500/20 text-blue-400'
            : 'bg-sky-500/25 text-sky-300';
        const avatarChar = isGroup ? '#' : item.label[0].toUpperCase();

        const timeStr = item.lastTime ? fmtTime(item.lastTime) : '';
        const badge   = item.unread > 0
            ? `<span class="flex-shrink-0 bg-rose-500 text-white text-[10px] font-bold
                           px-1.5 py-0.5 rounded-full min-w-[20px] text-center badge-pulse">
                 ${item.unread}
               </span>`
            : '';
        const typeBadge = isGroup
            ? `<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full
                            bg-blue-500/15 text-blue-400">Grupo</span>`
            : `<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full
                            bg-sky-500/15 text-sky-300">Directo</span>`;

        const preview = item.lastMsg
            ? `<p class="text-xs text-slate-500 truncate">${esc(item.lastMsg.slice(0,60))}</p>`
            : `<p class="text-xs text-slate-700 italic truncate">Sin mensajes aún</p>`;

        el.innerHTML = `
            <div class="w-11 h-11 rounded-2xl flex-shrink-0 flex items-center justify-center
                        text-base font-bold ${avatarCls}">
                ${avatarChar}
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5">
                    <span class="text-sm font-semibold ${item.active ? 'text-white' : 'text-slate-200'} truncate">
                        ${esc(item.label)}
                    </span>
                    ${typeBadge}
                </div>
                ${preview}
            </div>
            <div class="flex flex-col items-end gap-1 flex-shrink-0">
                ${timeStr ? `<span class="text-[10px] text-slate-600">${timeStr}</span>` : ''}
                ${badge}
            </div>
        `;
        el.onclick = () => item.onClick();
        container.appendChild(el);
    });
}

// ── Search ─────────────────────────────────────────────
function onSearch(value) {
    searchQuery = value;
    renderList();

    const actEl = q('search-actions');
    const v = value.trim();
    if (!v) { actEl.classList.add('hidden'); actEl.innerHTML = ''; return; }

    const actions = [];
    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    if (isEmail && !allDirectChats.some(c => c.email.toLowerCase() === v.toLowerCase())) {
        actions.push({ icon: '💬', label: `Mensaje directo a <strong>${esc(v)}</strong>`, fn: () => { selectDirect(v); clearSearch(); } });
    }
    if (!allGroups.some(g => g.name.toLowerCase() === v.toLowerCase())) {
        actions.push({ icon: '➕', label: `Crear grupo "<strong>${esc(v)}</strong>"`, fn: () => { createGroup(v); clearSearch(); } });
    }

    if (!actions.length) { actEl.classList.add('hidden'); actEl.innerHTML = ''; return; }
    actEl.classList.remove('hidden');
    actEl.innerHTML = '';
    actions.forEach(a => {
        const btn = document.createElement('button');
        btn.className = 'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-left transition-all';
        btn.innerHTML = `<span class="text-base">${a.icon}</span><span class="text-xs text-slate-300">${a.label}</span>`;
        btn.onclick = a.fn;
        actEl.appendChild(btn);
    });
}

function clearSearch() {
    q('search-input').value = '';
    searchQuery = '';
    q('search-actions').classList.add('hidden');
    q('search-actions').innerHTML = '';
    renderList();
}

// ── Mobile navigation ──────────────────────────────────
function showChatPanel() {
    if (window.innerWidth >= 768) return;  // desktop: always visible
    const list = q('panel-list');
    const chat = q('panel-chat');
    list.style.transform  = 'translateX(-100%)';
    list.style.opacity    = '0';
    list.style.pointerEvents = 'none';
    chat.style.transform  = 'translateX(0)';
    chat.style.opacity    = '1';
    chat.style.pointerEvents = 'auto';
}

function goBackToList() {
    activeChatType = null;
    activeTargetId = null;
    // Hide leave button when leaving group view
    q('leave-group-btn').classList.add('hidden');
    const list = q('panel-list');
    const chat = q('panel-chat');
    chat.style.transform  = 'translateX(100%)';
    chat.style.opacity    = '0';
    setTimeout(() => {
        chat.style.transform  = '';
        chat.style.opacity    = '';
        chat.style.pointerEvents = '';
    }, 330);
    list.style.transform  = '';
    list.style.opacity    = '';
    list.style.pointerEvents = '';
    renderList();
}

// ── Select conversation ────────────────────────────────
function selectGroup(groupId, groupName) {
    activeChatType = 'GROUP';
    activeTargetId = groupId;
    setChatHeader(groupName, 'Sala de grupo', '#', 'bg-blue-500/20 text-blue-400');
    q('add-member-btn').classList.remove('hidden');
    q('leave-group-btn').classList.remove('hidden');
    enableInput();
    loadHistory(`/api/messages/history/group/${groupId}`);
    showChatPanel();
    renderList();
}

function selectDirect(email) {
    activeChatType = 'DIRECT';
    activeTargetId = email;
    setChatHeader(email, 'Chat privado', email[0].toUpperCase(), 'bg-sky-500/25 text-sky-300');
    q('add-member-btn').classList.add('hidden');
    q('leave-group-btn').classList.add('hidden');
    enableInput();
    loadHistory(`/api/messages/history/${email}`);
    showChatPanel();
    renderList();
}

function setChatHeader(title, sub, avatarChar, avatarCls) {
    q('chat-title').textContent    = title;
    q('chat-subtitle').textContent = sub;
    const av = q('chat-avatar');
    av.textContent = avatarChar;
    av.className   = `w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-sm font-bold ${avatarCls}`;
}

// ── Group actions ──────────────────────────────────────
async function createGroup(name) {
    if (!name?.trim()) return;
    try {
        const r = await api('/api/groups', 'POST', { name: name.trim() });
        if (r.ok) {
            const data = await r.json();
            await refreshAll();
            subscribeGroups();
            if (data?.id) selectGroup(data.id, data.name);
        }
    } catch (e) { console.error(e); }
}

function openAddMemberModal() {
    if (activeChatType !== 'GROUP') return;
    const email = prompt('Email del amigo a añadir:');
    if (!email?.trim()) return;
    api(`/api/groups/${activeTargetId}/members`, 'POST', { email: email.trim() })
        .then(r => r.ok ? alert('¡Añadido!') : alert('Error: verifica que el usuario exista'));
}

// Leave current group
async function leaveCurrentGroup() {
    if (activeChatType !== 'GROUP') return;
    if (!confirm('¿Estás seguro de que quieres salir del grupo?')) return;
    const email = currentUserEmail; // user leaving is the current user
    const res = await api(`/api/groups/${activeTargetId}/members`, 'DELETE', { email });
    if (res.ok) {
        alert('Has salido del grupo');
        // Go back to list view (user can refresh manually)
        goBackToList();
    } else {
        alert('Error al salir del grupo');
    }
}

// ── Messages ───────────────────────────────────────────
function enableInput() {
    q('message-input').disabled    = false;
    q('message-input').placeholder = 'Escribe un mensaje…';
    q('send-btn').disabled         = false;
}

async function loadHistory(url) {
    const container = q('messages-container');
    container.innerHTML = `<div class="m-auto text-slate-600 text-xs anim-fade-in">Cargando…</div>`;
    try {
        const r = await api(url);
        const history = await r.json();
        container.innerHTML = '';
        if (!history.length) {
            container.innerHTML = `<div class="m-auto flex flex-col items-center text-center anim-fade-in">
                <p class="text-slate-600 text-sm">Sin mensajes aún. ¡Di hola! 👋</p>
            </div>`;
        } else {
            history.forEach(appendMessage);
        }
        // Refresh previews after loading history
        const key = activeChatType === 'GROUP'
            ? `GROUP:${activeTargetId}`
            : `DIRECT:${activeTargetId}`;
        delete previewCache[key];
        refreshAll();
    } catch {
        container.innerHTML = `<div class="m-auto text-rose-500 text-xs">Error al cargar.</div>`;
    }
}

async function sendMessage() {
    const inp     = q('message-input');
    const content = inp.value.trim();
    if (!content) return;

    const body = { content };
    if (activeChatType === 'DIRECT') body.receiverId = activeTargetId;
    if (activeChatType === 'GROUP')  body.groupId    = activeTargetId;

    inp.value = '';
    inp.focus();

    try {
        await api('/api/messages/send', 'POST', body);
        // Invalidate cache for this conversation so preview refreshes
        const key = activeChatType === 'GROUP'
            ? `GROUP:${activeTargetId}`
            : `DIRECT:${activeTargetId}`;
        delete previewCache[key];
    } catch (e) { console.error(e); }
}

async function markRead(groupId, peerEmail) {
    await api('/api/messages/read', 'POST', { groupId, peerEmail });
    refreshAll();
}

function appendMessage(m) {
    const c = q('messages-container');
    // Remove placeholders
    c.querySelectorAll('.m-auto').forEach(el => el.remove());
    if (c.children.length === 0) c.innerHTML = '';

    const isMe  = m.senderEmail === currentUserEmail;
    const div   = document.createElement('div');
    const time  = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.className = `flex flex-col max-w-[80%] anim-fade-up ${isMe ? 'self-end items-end' : 'self-start items-start'}`;

    const senderTag = !isMe && activeChatType === 'GROUP'
        ? `<span class="text-[10px] text-blue-400 font-semibold mb-1 px-1">${esc(m.senderEmail)}</span>`
        : '';

    div.innerHTML = `
        ${senderTag}
        <div class="px-4 py-2.5 rounded-2xl shadow-sm
            ${isMe
                ? 'bg-blue-600 text-white bubble-me'
                : 'bg-slate-800 text-slate-100 border border-slate-700/50 bubble-them'}">
            <p class="text-sm leading-relaxed break-words">${esc(m.content)}</p>
            <p class="text-[10px] mt-1 opacity-40 text-right">${time}</p>
        </div>
    `;
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
}

// ── Helpers ─────────────────────────────────────────────
function q(id) { return document.getElementById(id); }

function api(url, method = 'GET', body = null, auth = true) {
    const headers = { 'Content-Type': 'application/json' };
    if (auth && token) headers['Authorization'] = 'Bearer ' + token;
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    return fetch(url, opts);
}

function esc(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
}

function fmtTime(iso) {
    if (!iso) return '';
    const d   = new Date(iso);
    const now = new Date();
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (diffDays === 1) return 'Ayer';
    if (diffDays < 7)  return d.toLocaleDateString([], { weekday: 'short' });
    return d.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
}

function logout() {
    if (stompClient) stompClient.deactivate();
    localStorage.clear();
    location.reload();
}
</script>
