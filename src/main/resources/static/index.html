<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatrop Premium - Grupos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        .message-fade {
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-900 h-screen w-screen flex items-center justify-center font-sans antialiased text-slate-200">

    <div id="login-card"
        class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700/50 message-fade">
        <h2
            class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-violet-400 mb-2 text-center">
            Chatrop v2</h2>
        <p class="text-sm text-slate-400 mb-6 text-center">Inicia sesión para acceder a tus salas y grupos</p>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo electrónico" value="tester@chatrop.com"
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500 transition-all">
            <input type="password" id="login-password" placeholder="Contraseña" value="password"
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500 transition-all">
            <button onclick="login()"
                class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold p-4 rounded-xl shadow-lg transition-all transform active:scale-95">Entrar</button>
        </div>
    </div>

    <div id="chat-app"
        class="hidden w-full h-full max-w-6xl md:h-[85vh] bg-slate-800 md:rounded-3xl shadow-2xl flex border border-slate-700/50 overflow-hidden message-fade">

        <div class="w-1/3 border-r border-slate-700/50 flex flex-col bg-slate-850">
            <div class="p-4 border-b border-slate-700/50 flex items-center justify-between bg-slate-900/40">
                <div class="truncate">
                    <p class="text-xs text-slate-400">Conectado como</p>
                    <p id="user-display" class="font-bold text-indigo-400 truncate text-sm">email@example.com</p>
                </div>
                <button onclick="logout()"
                    class="text-xs bg-slate-700 hover:bg-rose-900/50 text-slate-300 p-2 rounded-lg transition-all">Salir</button>
            </div>

            <div class="p-4 flex flex-col flex-1 border-b border-slate-700/30 overflow-y-auto">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Mis Grupos</span>
                    <button onclick="openCreateGroupModal()"
                        class="text-xs bg-indigo-600/30 hover:bg-indigo-600 text-indigo-300 hover:text-white px-2 py-1 rounded transition-all">+
                        Crear</button>
                </div>
                <div id="groups-list" class="space-y-1"></div>
            </div>

            <div class="p-4 flex flex-col h-1/3">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Chat Directo</span>
                <input type="email" id="direct-user-email" placeholder="Email del destinatario..."
                    class="p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-xs text-white mb-2 focus:outline-none focus:border-indigo-500">
                <button onclick="startDirectChat()"
                    class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold p-2 rounded-lg text-xs transition-all">Abrir
                    Chat Privado</button>
                <div id="active-dm-target" class="mt-2 text-xs text-center text-slate-500 italic"></div>
                <div id="direct-chats-list" class="space-y-1 mt-3 flex-1 overflow-y-auto"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-900/20">
            <div class="p-4 border-b border-slate-700/50 flex items-center justify-between bg-slate-900/40">
                <div>
                    <h3 id="chat-title" class="text-lg font-bold text-white">Selecciona un chat o grupo</h3>
                    <p id="chat-subtitle" class="text-xs text-slate-400">Comienza a enviar mensajes en tiempo real</p>
                </div>
                <button id="add-member-btn" onclick="openAddMemberModal()"
                    class="hidden text-xs bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg font-medium transition-all">
                    + Añadir Amigo
                </button>
            </div>

            <div id="messages-container" class="flex-1 p-6 overflow-y-auto flex flex-col space-y-3 bg-slate-900/10">
                <div class="text-center text-slate-500 text-sm my-auto">No hay mensajes activos en esta sala</div>
            </div>

            <div class="p-4 border-t border-slate-700/50 bg-slate-900/40 flex items-center space-x-3">
                <input type="text" id="message-input" disabled placeholder="Elige una sala para escribir..."
                    onkeypress="if(event.key==='Enter') sendMessage()"
                    class="flex-1 p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500 disabled:opacity-50 transition-all">
                <button id="send-btn" disabled onclick="sendMessage()"
                    class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white p-4 rounded-xl font-bold px-6 shadow-lg transition-all transform active:scale-95">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const WS_URL = `${wsProtocol}//${window.location.host}/ws`;

        let token = localStorage.getItem('token');
        let currentUserEmail = localStorage.getItem('userEmail');
        let currentUserId = localStorage.getItem('userId');
        let stompClient = null;
        let activeChatType = null;
        let activeTargetId = null;
        let unreadCounts = { groups: {}, directs: {} };
        let groupSubscriptions = {};

        window.onload = function () {
            if (token && currentUserEmail && currentUserId) {
                showChatApp();
            }
        };

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (!res.ok) throw new Error('Credenciales inválidas o error de servidor');
                const data = await res.json();

                token = data.token;
                currentUserEmail = email;
                currentUserId = data.userId;
                localStorage.setItem('token', token);
                localStorage.setItem('userEmail', currentUserEmail);
                localStorage.setItem('userId', currentUserId);

                showChatApp();
            } catch (err) {
                alert(err.message);
            }
        }

        function showChatApp() {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUserEmail;
            connectWebSocket();
            refreshSidebar();
        }

        function connectWebSocket() {
            stompClient = new StompJs.Client({
                brokerURL: WS_URL,
                connectHeaders: { 'Authorization': 'Bearer ' + token },
                reconnectDelay: 5000,
                heartbeatIncoming: 4000,
                heartbeatOutgoing: 4000
            });

            stompClient.onConnect = (frame) => {
                console.log('¡Conectado al Servidor de WebSockets!');

                // Suscripción a mis DMs
                stompClient.subscribe('/topic/messages/' + currentUserId, (sdkEvent) => {
                    const msg = JSON.parse(sdkEvent.body);
                    const peer = msg.senderEmail === currentUserEmail ? msg.receiverEmail : msg.senderEmail;
                    if (activeChatType === 'DIRECT' && activeTargetId === peer) {
                        appendMessageToUI(msg);
                        if (msg.senderEmail !== currentUserEmail) {
                            markMessageAsRead(null, peer);
                        }
                    } else {
                        refreshSidebar();
                    }
                });

                // Suscribirse a todos los grupos para enterarse de nuevos mensajes en tiempo real
                subscribeToAllGroups();
            };

            stompClient.activate();
        }

        async function subscribeToAllGroups() {
            // Cancelar suscripciones previas si las hay
            for (const key in groupSubscriptions) {
                groupSubscriptions[key].unsubscribe();
            }
            groupSubscriptions = {};

            try {
                const res = await fetch('/api/groups', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const groups = await res.json();
                groups.forEach(g => {
                    const sub = stompClient.subscribe(`/topic/messages/group/${g.id}`, (sdkEvent) => {
                        const msg = JSON.parse(sdkEvent.body);
                        if (activeChatType === 'GROUP' && activeTargetId === msg.groupId) {
                            appendMessageToUI(msg);
                            if (msg.senderEmail !== currentUserEmail) {
                                markMessageAsRead(msg.groupId, null);
                            }
                        } else {
                            refreshSidebar();
                        }
                    });
                    groupSubscriptions[g.id] = sub;
                });
            } catch (err) {
                console.error('Error al suscribir a grupos:', err);
            }
        }

        async function fetchUnreadCounts() {
            try {
                const res = await fetch('/api/messages/unread', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    unreadCounts = await res.json();
                }
            } catch (err) {
                console.error('Error al obtener no leídos:', err);
            }
        }

        async function refreshSidebar() {
            await fetchUnreadCounts();
            await loadGroups();
            await loadDirectChats();
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/groups', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const groups = await res.json();
                const container = document.getElementById('groups-list');
                container.innerHTML = '';

                groups.forEach(g => {
                    const unread = unreadCounts.groups[g.id] || 0;
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-3 rounded-xl text-sm font-semibold transition-all flex items-center justify-between ${activeTargetId === g.id && activeChatType === 'GROUP' ? 'bg-indigo-600 text-white' : 'bg-slate-900/40 hover:bg-slate-700/40 text-slate-300'}`;
                    
                    let badgeHtml = '';
                    if (unread > 0) {
                        badgeHtml = `<span class="bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full min-w-[20px] text-center">${unread}</span>`;
                    }

                    btn.innerHTML = `
                        <div class="flex items-center space-x-2 truncate">
                            <span class="bg-indigo-500/30 text-indigo-300 p-1.5 rounded-lg text-xs font-mono">#</span>
                            <span class="truncate">${g.name}</span>
                        </div>
                        ${badgeHtml}
                    `;
                    btn.onclick = () => selectGroupChat(g.id, g.name);
                    container.appendChild(btn);
                });
            } catch (err) { console.error('Error al cargar grupos:', err); }
        }

        async function loadDirectChats() {
            try {
                const res = await fetch('/api/messages/conversations', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const conversations = await res.json();
                const container = document.getElementById('direct-chats-list');
                container.innerHTML = '';

                conversations.forEach(c => {
                    const unread = unreadCounts.directs[c.email] || 0;
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-3 rounded-xl text-sm font-semibold transition-all flex items-center justify-between ${activeTargetId === c.email && activeChatType === 'DIRECT' ? 'bg-indigo-600 text-white' : 'bg-slate-900/40 hover:bg-slate-700/40 text-slate-300'}`;
                    
                    let badgeHtml = '';
                    if (unread > 0) {
                        badgeHtml = `<span class="bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full min-w-[20px] text-center">${unread}</span>`;
                    }

                    btn.innerHTML = `
                        <div class="flex items-center space-x-2 truncate">
                            <span class="bg-emerald-500/30 text-emerald-300 p-1.5 rounded-lg text-xs font-mono">@</span>
                            <span class="truncate">${c.email}</span>
                        </div>
                        ${badgeHtml}
                    `;
                    btn.onclick = () => {
                        document.getElementById('direct-user-email').value = c.email;
                        startDirectChat();
                    };
                    container.appendChild(btn);
                });
            } catch (err) { console.error('Error al cargar chats directos:', err); }
        }

        async function openCreateGroupModal() {
            const name = prompt('Introduce el nombre del nuevo grupo:');
            if (!name || name.trim() === '') return;

            try {
                const res = await fetch('/api/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ name })
                });
                if (res.ok) {
                    refreshSidebar();
                    subscribeToAllGroups();
                }
            } catch (err) { alert('No se pudo crear el grupo'); }
        }

        function openAddMemberModal() {
            if (activeChatType !== 'GROUP') return;
            const email = prompt('Introduce el email del amigo que quieres invitar al grupo:');
            if (!email || email.trim() === '') return;

            fetch(`/api/groups/${activeTargetId}/members`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ email })
            }).then(res => {
                if (res.ok) alert('¡Miembro añadido con éxito!');
                else alert('Error: Asegúrate de que el usuario exista y no esté ya en el grupo');
            });
        }

        function startDirectChat() {
            const email = document.getElementById('direct-user-email').value;
            if (!email || email.trim() === '') return;

            activeChatType = 'DIRECT';
            activeTargetId = email;
            document.getElementById('active-dm-target').innerText = `Escribiendo a: ${email}`;

            document.getElementById('chat-title').innerText = email;
            document.getElementById('chat-subtitle').innerText = "Chat privado";
            document.getElementById('add-member-btn').classList.add('hidden');

            enableInputs();
            loadHistory(`/api/messages/history/${email}`);
        }

        function selectGroupChat(groupId, groupName) {
            activeChatType = 'GROUP';
            activeTargetId = groupId;
            document.getElementById('active-dm-target').innerText = '';

            document.getElementById('chat-title').innerText = groupName;
            document.getElementById('chat-subtitle').innerText = "Sala de grupo";
            document.getElementById('add-member-btn').classList.remove('hidden');

            enableInputs();
            loadHistory(`/api/messages/history/group/${groupId}`);
        }

        function enableInputs() {
            document.getElementById('message-input').disabled = false;
            document.getElementById('message-input').placeholder = "Escribe un mensaje...";
            document.getElementById('send-btn').disabled = false;
        }

        async function loadHistory(url) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<div class="text-center text-slate-500 text-xs my-auto">Cargando historial...</div>';
            try {
                const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
                const history = await res.json();
                container.innerHTML = '';
                if (history.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-500 text-xs my-auto">No hay mensajes anteriores en esta sala.</div>';
                } else {
                    history.forEach(appendMessageToUI);
                }
                refreshSidebar();
            } catch (err) { container.innerHTML = 'Error al cargar el historial.'; }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value;
            if (!content || content.trim() === '') return;

            const body = { content: content };
            if (activeChatType === 'DIRECT') body.receiverId = activeTargetId;
            if (activeChatType === 'GROUP') body.groupId = activeTargetId;

            input.value = '';

            try {
                await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(body)
                });
            } catch (err) { console.error('Error al enviar mensaje:', err); }
        }

        async function markMessageAsRead(groupId, peerEmail) {
            try {
                await fetch('/api/messages/read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ groupId, peerEmail })
                });
                refreshSidebar();
            } catch (err) {
                console.error('Error al marcar como leído:', err);
            }
        }

        function appendMessageToUI(m) {
            const container = document.getElementById('messages-container');
            if (container.querySelector('.my-auto')) container.innerHTML = '';

            const isMe = m.senderEmail === currentUserEmail;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[75%] p-3.5 rounded-2xl shadow-md message-fade flex flex-col ${isMe ? 'bg-gradient-to-br from-indigo-600 to-indigo-700 text-white self-end rounded-tr-none' : 'bg-slate-800 text-slate-200 border border-slate-700/50 self-start rounded-tl-none'}`;

            msgDiv.innerHTML = `
                <div class="text-[10px] font-bold mb-1 ${isMe ? 'text-indigo-200' : 'text-indigo-400'}">${isMe ? 'Tú' : m.senderEmail}</div>
                <div class="text-sm font-medium leading-relaxed break-words">${m.content}</div>
                <div class="text-[9px] opacity-40 text-right mt-1.5 font-mono">${new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>

</html>
